services:
  automator:
    build: .
    restart: unless-stopped
    environment:
      - ADB_SERVER_SOCKET=tcp:droidctrl:5037
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
      - RETRY_INTERVAL=${RETRY_INTERVAL:-300}
      - RETRY_WAIT=${RETRY_WAIT:-180}
      - RETRY_WEBHOOK=${RETRY_WEBHOOK:-}
      - RETRY_WEBHOOK_MESSAGE=${RETRY_WEBHOOK_MESSAGE:-}
      - RETRY_WEBHOOK_AVATAR=${RETRY_WEBHOOK_AVATAR:-}
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-80}
      - SCALE=${SCALE:-3}
      - GEM_MIN_SCORE=${GEM_MIN_SCORE:-0.70}
      - GEM_RADIUS_MIN=${GEM_RADIUS_MIN:-280}
      - GEM_RADIUS_MAX=${GEM_RADIUS_MAX:-360}
      - GEM_PERIOD=${GEM_PERIOD:-12.0}
      - PIPELINE_LATENCY=${PIPELINE_LATENCY:-0.9}
    volumes:
      - ${ADB_KEY_DIR:-${HOME}/.android}/adbkey:/root/.android/adbkey:ro
      - ${ADB_KEY_DIR:-${HOME}/.android}/adbkey.pub:/root/.android/adbkey.pub:ro
      # Bind-mount source so `docker compose restart` picks up edits without
      # rebuilding the image. The Dockerfile's COPY of the same files still
      # bakes a working fallback into the image for fresh `up`s.
      - ./automator.py:/automator.py:ro
      - ./gem.py:/gem.py:ro

# Join the network droidctrl is on, so we can reach its ADB server.
networks:
  default:
    name: ${NETWORK:-droidctrl_default}
    external: true
